name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack (Yarn berry)
        run: corepack enable
        shell: bash

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

  # Lightweight job that gates merges — the matrix above can be slow.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build-test]
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        if: ${{ needs.build-test.result != 'success' }}
        run: |
          echo "build-test result: ${{ needs.build-test.result }}"
          exit 1
      - run: echo "All CI checks passed."
